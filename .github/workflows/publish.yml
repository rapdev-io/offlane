name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored anywhere.
# Fires when you publish a GitHub Release. Configure the trusted publisher on PyPI
# first (pypi.org -> Publishing -> add pending publisher):
#   project=offlane  owner=rapdev-io  repo=offlane  workflow=publish.yml  environment=pypi
#
# Actions are pinned to full-length commit SHAs (org policy). To bump one:
#   gh api repos/<owner>/<repo>/commits/<tag> --jq .sha

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install (with test extra), test, and build
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[test]"
          pytest -q
          python -m build
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
