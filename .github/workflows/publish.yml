name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored anywhere.
# Fires when you publish a GitHub Release. Configure the trusted publisher on PyPI
# first: pypi.org -> your account -> Publishing -> add a pending publisher with
#   PyPI project: offlane   owner: rapdev-io   repo: offlane
#   workflow: publish.yml    environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with test extra) and run tests
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[test]"
          pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
